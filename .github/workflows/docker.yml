name: Docker

on:
  workflow_call:
    inputs:
      stack:
        required: true
        type: string

jobs:

  docker:

    runs-on: ubuntu-latest

    steps:

      - uses: actions/checkout@v4

      - name: Download Artifact
        if: inputs.stack != 'node'
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: app

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.ACCESS_TOKEN }}

      - name: Extract Repo Name
        id: repo
        run: |
          echo "repo_name=$(echo '${{ github.event.repository.name }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Build Push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.repo.outputs.repo_name }}:latest
            ${{ secrets.DOCKER_USERNAME }}/${{ steps.repo.outputs.repo_name }}:${{ github.sha }}