name: "Smart Centralized CI Orchesrator"

on:
  workflow_call:
    inputs:
      enable_publish:
        description: 'Toggle to enable or disable the Docker publish stage'
        required: false
        type: boolean
        default: true

jobs:
  pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # 1. Checkout using the shared composite action
      - name: Checkout Code
        uses: your-org/devops-platform/.github/actions/checkout@main

      # 2. Automatically detect stack
      - name: Detect Technology Stack
        id: detect
        uses: your-org/devops-platform/.github/actions/detect-stack@main

      # 3. Build based on detected stack
      - name: Build Application
        uses: your-org/devops-platform/.github/actions/build@main
        with:
          stack: ${{ steps.detect.outputs.stack }}

      # 4. Conditionally build & publish image to GHCR
      - name: Publish Docker Image
        if: ${{ inputs.enable_publish == true }}
        uses: your-org/devops-platform/.github/actions/docker-publish@main
        with:
          # Converts repository name to lowercase safely to meet docker naming conventions
          image_name: ${{ github.repository }}