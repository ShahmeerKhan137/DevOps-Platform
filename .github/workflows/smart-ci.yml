name: Smart CI

on:
  workflow_call:

jobs:

  detect:

    uses: ShahmeerKhan137/devops-platform/.github/workflows/detect.yml@main

  build:

    needs: detect

    uses: ShahmeerKhan137/devops-platform/.github/workflows/build.yml@main

    with:
      stack: ${{ needs.detect.outputs.stack }}

  docker:

    needs:
      - detect
      - build

    uses: ShahmeerKhan137/devops-platform/.github/workflows/docker.yml@main

    with:
      stack: ${{ needs.detect.outputs.stack }}

    secrets: inherit

  cleanup:

    needs:
      - detect
      - build
      - docker

    if: always()

    uses: ShahmeerKhan137/devops-platform/.github/workflows/cleanup.yml@mains