name: 'Build Application'
description: 'Compiles the application based on the detected stack'
inputs:
  stack:
    description: 'The stack identified during detection'
    required: true

runs:
  using: 'composite'
  steps:
    - name: Build Maven Application
      if: ${{ inputs.stack == 'maven' }}
      shell: bash
      run: mvn clean package -DskipTests

    - name: Build Gradle Application
      if: ${{ inputs.stack == 'gradle' }}
      shell: bash
      run: ./gradlew build -x test

    - name: Build Node.js Application
      if: ${{ inputs.stack == 'node' }}
      shell: bash
      run: |
        npm ci
        npm run build --if-present

    - name: Build Python Application
      if: ${{ inputs.stack == 'python' }}
      shell: bash
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi